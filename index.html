<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XX city</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>XX</h1>
        <div>aa</div>
        <div class="hamburger" id="hamburger_open">
            <div class="ham-line"></div>
            <div class="ham-line"></div>
            <div class="ham-line"></div>
        </div>
    </header>
    <div class="carousel">
        <div class="carousel-area">
            <img src="a">
            <img src="b">
            <img src="c">
        </div>
    </div>
    <div id="nav-wrap">
        <div class="nav-head">
            MENU
            <div>close</div>
        </div>
        <nav>
            <div class="nav-link">タブ1</div>
            <div class="nav-link">タブ2</div>
            <div class="nav-link">タブ3</div>
            <div class="nav-link">タブ4</div>
            <div class="nav-link">タブ5</div>
        </nav>
    </div>
    <main>
        <h2>最新情報</h2>
        <div class="news">
            <div class="news-link">aついて</div>
            <div class="news-link">bについて</div>
            <div class="news-link">cについて</div>
        </div>
        <h2>このページについて</h2>
        <div class="">
            レスポンシブル対応、JSカルーセル、バナーデザイン
        </div>
    </main>
    <footer></footer>
    <div class="alert">
        <p>この機能は現在使用できません</p>
        <button>close</button></div>
    <script>
        // カルーセルのアニメーション(クラス付け替え)
        const banner = document.querySelectorAll(".carousel img");

        let index = 0;
        banner[0].style.background = "blue";

        banner[0].classList.add("active");
        function showNext() {
            banner[index].classList.remove("next");
            banner[index].classList.add("active");
            banner[(index - 1 + banner.length) % banner.length].classList.remove("active");
            banner[(index + 1) % banner.length].classList.add("next");
            index = (index + 1) % banner.length;
        }

        setInterval(showNext, 4000);

        // ハンバーガーメニュー
        const hamburger = document.getElementById("nav-wrap");
        const hamburgerTrigger = document.getElementById("hamburger_open");
        hamburgerTrigger.addEventListener("click",()=>{
            if(hamburgerTrigger.classList.contains("open-x")){
                hamburger.classList.remove("open");
                hamburgerTrigger.classList.remove("open-x");
            } else {
                hamburger.classList.add("open");
                hamburgerTrigger.classList.add("open-x"); 
            }
        });
        hamburger.addEventListener("click",(e)=>{
            if(e.target.closest("nav")) return;
            hamburger.classList.remove("open");
        });

        /* ナビゲーションに変数を設定 */
        const navLink = document.querySelectorAll("nav .nav-link");
        for(let i = 0; i < navLink.length; i++){
            navLink[i].style.setProperty("--delay",i);
        }
    </script>
</body>
</html>
